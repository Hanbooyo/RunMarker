services:
  postgres:
    image: postgres:16
    container_name: stravamate-passport-postgres
    environment:
      POSTGRES_DB: stravamate_passport
      POSTGRES_USER: stravamate
      POSTGRES_PASSWORD: stravamate
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
