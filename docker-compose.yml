services:
  postgres:
    image: postgres:16
    container_name: stravamate-passport-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stravamate_passport}
      POSTGRES_USER: ${POSTGRES_USER:-stravamate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.docker}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stravamate-passport-backend
    restart: unless-stopped
    env_file:
      - path: .env.docker
        required: false
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-stravamate_passport}
      DB_USERNAME: ${POSTGRES_USER:-stravamate}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.docker}
      SERVER_PORT: ${SERVER_PORT:-8080}
      SESSION_TIMEOUT: ${SESSION_TIMEOUT:-60m}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:5173}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      STRAVA_CLIENT_ID: ${STRAVA_CLIENT_ID:-}
      STRAVA_CLIENT_SECRET: ${STRAVA_CLIENT_SECRET:-}
      STRAVA_REDIRECT_URI: ${STRAVA_REDIRECT_URI:-http://localhost:8080/api/auth/strava/callback}
      GEOCODING_PROVIDER: ${GEOCODING_PROVIDER:-nominatim}
      NOMINATIM_BASE_URL: ${NOMINATIM_BASE_URL:-https://nominatim.openstreetmap.org}
      NOMINATIM_USER_AGENT: ${NOMINATIM_USER_AGENT:-RunMarker/0.1 docker-local}
      GEOCODING_CACHE_COORDINATE_SCALE: ${GEOCODING_CACHE_COORDINATE_SCALE:-3}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    profiles: ["app"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
        VITE_DEMO_MODE: ${VITE_DEMO_MODE:-false}
    container_name: stravamate-passport-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
