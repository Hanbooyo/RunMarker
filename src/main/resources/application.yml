spring:
  application:
    name: stravamate-passport

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/stravamate_passport}
    username: ${DB_USERNAME:stravamate}
    password: ${DB_PASSWORD:stravamate}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}
  servlet:
    session:
      timeout: ${SESSION_TIMEOUT:60m}

mybatis:
  mapper-locations: classpath:mappers/**/*.xml
  type-aliases-package: com.stravamate.passport.domain.entity
  configuration:
    map-underscore-to-camel-case: true

app:
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  auth:
    login-success-path: ${AUTH_LOGIN_SUCCESS_PATH:/login/success}
    login-error-path: ${AUTH_LOGIN_ERROR_PATH:/login/error}
  strava:
    client-id: ${STRAVA_CLIENT_ID:}
    client-secret: ${STRAVA_CLIENT_SECRET:}
    redirect-uri: ${STRAVA_REDIRECT_URI:http://localhost:8080/api/auth/strava/callback}
    authorize-url: https://www.strava.com/oauth/authorize
    token-url: https://www.strava.com/oauth/token
    api-base-url: https://www.strava.com/api/v3
  geocoding:
    provider: ${GEOCODING_PROVIDER:nominatim}
    nominatim-base-url: ${NOMINATIM_BASE_URL:https://nominatim.openstreetmap.org}
    nominatim-user-agent: ${NOMINATIM_USER_AGENT:StravaMatePassport/0.1 local}
    cache-coordinate-scale: ${GEOCODING_CACHE_COORDINATE_SCALE:3}

logging:
  level:
    com.stravamate.passport: INFO
